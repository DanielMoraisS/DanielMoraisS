name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=yellow&color_dots=%23ff6600,%23ff8c00,%23ffa500,%23ffb732,%23ffd280&color_empty=blue
            dist/github-snake-dark.svg?palette=github-dark&color_snake=yellow&color_dots=%23ff6600,%23ff8c00,%23ffa500,%23ffb732,%23ffd280&color_empty=blue
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}