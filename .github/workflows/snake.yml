name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=red&color_dots=#9be9a8,#40c463,#30a14e,#216e39,#161b22&color_empty=#0d1117
            dist/github-snake-dark.svg?color_snake=red&color_dots=#9be9a8,#40c463,#30a14e,#216e39,#161b22&color_empty=#0d1117
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
