name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23FFD700&color_dots=%231a1a2e,%2316213e,%230f3460,%23000000,%23000000&color_empty=%230a0a2e
            dist/github-snake-dark.svg?color_snake=%23FFD700&color_dots=%231a1a2e,%2316213e,%230f3460,%23000000,%23000000&color_empty=%230a0a2e
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
