name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.gif?color_snake=black&color_dots=#0a0a2e,#ff6600,#ff8c00,#ffa500,#ffd280&color_background=#0a0a2e
            dist/github-snake-dark.gif?color_snake=black&color_dots=#0a0a2e,#ff6600,#ff8c00,#ffa500,#ffd280&color_background=#0a0a2e
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}